<!-- First --><div class="container" style="margin-top: 100px;"> 
    <div class="row mt-30" id="firstMain">
        <div class="col-md-6 col-6">
            <img src="assets/cashflow-breadcrumb.svg" class="wd125">
          </div>
          <div class="col-md-6 col-12 bread-p text-right">
            <p class="mb-1">Cashflow Calculator</p>
            <p class="mb-0">{{validation.getCurrentDateWithSpecificFormat()}}</p>
          </div> 
    </div>
      <!-- First -->
    
    <!-- Second -->
    <div class="row mt-3 plr-1"  id="secondMain">
        <div class="mapcontainer">
            <app-googlemap [MapClassLoad]="MapLoad" [latitude]="lat" [longitude]="long"></app-googlemap>
          </div>
    </div>
    <!-- Second -->
    
    <!-- Third -->
      <div class="row mt-3 plr-15"  id="thirdMain">
        <div class="col-md-12 p0 prl10">
            <progress-bar [progress]="(75+(foreignbuyer!=''?4.168:0)+(stampDutyLandTax!=''?4.168:0)+(loanOriginationFee!=''?4.168:0)+(letteingManagFee!=''?4.168:0)+(groundRent!=''?4.168:0)+(serviceCharges!=''?4.168:0))" [color]="'#488aff'">
            </progress-bar>
        </div>
        <div class="col-md-2 col-6 p-back pl17">
            <a [routerLink]="['/cashflow/step3']" class="backlink">Back</a>
        </div>
        <div class="col-md-10 col-6 p-rec pr13">
            <label class="float-right">{{75+(foreignbuyer!=''?4.168:0)+(stampDutyLandTax!=''?4.168:0)+(loanOriginationFee!=''?4.168:0)+(letteingManagFee!=''?4.168:0)+(groundRent!=''?4.168:0)+(serviceCharges!=''?4.168:0)+(miscelleneousExpense!=''?4.168:0) | number:'1.0-0'}}% data recieved</label>
        </div>
      </div>
    <!-- Third -->
    <div class="row mt-3 plr-15">
        <div class="col-md-5 pl0">
            <h5>
                <b class="questyle">
                    Are You a Foreign Buyer?
                  </b>
            </h5>
        </div>
        <div class="col-md-7 pr0">
            <select id="foreignbuyer" [(ngModel)]="foreignbuyer" (change) = "calculatestampduty()">
                <option value="">Select</option>
                <option value="1">Yes</option>
                <option value="0">No</option>
            </select>
        </div>
    </div>
    <div class="row mt-3 plr-15" [@asfirst]="foreignbuyer!=''?'visible':'hide'">
        <div class="col-md-5 pl0">
            <h5><b class="questyle">Stamp duty & Land tax</b></h5>
        </div>
        <div class="col-md-7 pr0">
            <input type="text" id="stampDutyLandTax" autocomplete="off" (keyup)="stampDutyLandTax=validation.amountWithComma(stampDutyLandTax)" (keypress)="validation.numberOnly($event)" [(ngModel)]="stampDutyLandTax" placeholder="Stamp duty & land tax (£3,000)">
            <span *ngIf="stampDutyLandTax!=''" class="tick-g"><i class="fa fa-check" aria-hidden="true"></i></span>
        </div>
    </div>
    <div class="row plr-15 mt-3" [@afsfirst]="stampDutyLandTax!='' && foreignbuyer!='' && this.calcData.optmortgage!='0'?'visible':'hide'">
        <div class="col-md-5 pl0">
            <h5><b class="questyle">Processing fee</b></h5>
        </div>
        <div class="col-md-7 pr0">
            <input type="text" id="loanOriginationFee" autocomplete="off" (keyup)="loanOriginationFee=validation.appendPercent($event,loanOriginationFee)" (keypress)="validation.DesimalOnly($event,loanOriginationFee)" [(ngModel)]="loanOriginationFee" placeholder="Loan origination fee (1%)" class="">
            <span *ngIf="loanOriginationFee!=''" class="tick-g"><i class="fa fa-check" aria-hidden="true"></i></span>
        </div>
    </div>
    <div class="row mt-3 plr-15" [@assfirst]="loanOriginationFee!='' && foreignbuyer!=''?'visible':'hide'">
        <div class="col-md-5 pl0">
            <h5><b class="questyle">Lettings Fee p.a</b></h5>
        </div>
        <div class="col-md-7 pr0">
            <input type="text" id="letteingManagFee" autocomplete="off" (keyup)="letteingManagFee=validation.appendPercent($event,letteingManagFee)" (keypress)="validation.DesimalOnly($event,letteingManagFee)" [(ngModel)]="letteingManagFee" placeholder="Letting management fee ({{PropertyLondon == 1 ? '12%' : '10%'}})" class="">
            <span *ngIf="letteingManagFee!=''" class="tick-g"><i class="fa fa-check" aria-hidden="true"></i></span>
        </div>
    </div>
    <div class="row mt-3 plr-15" [@affirst]="letteingManagFee!='' && foreignbuyer!=''?'visible':'hide'">
        <div class="col-md-5 pl0">
            <h5><b class="questyle">Ground rent p.a</b></h5>
        </div>
        <div class="col-md-7 pr0">
            <input type="text" id="groundRent" autocomplete="off" [(ngModel)]="groundRent" (keyup)="groundRent=validation.amountWithComma(groundRent)" (keypress)="validation.numberOnly($event)" placeholder="Ground rent ({{PropertyLondon == 1 ? '£500' : '£350'}})">
            <span *ngIf="groundRent!=''" class="tick-g"><i class="fa fa-check" aria-hidden="true"></i></span>
        </div>
    </div>
    <div class="row mt-3 plr-15" [@asfirst]="letteingManagFee!='' && foreignbuyer!='' ?'visible':'hide'">
        <div class="col-md-5 pl0">
            <h5><b class="questyle">Service charges p.a</b></h5>
        </div>
        <div class="col-md-7 pr0">
            <input type="text" id="serviceCharges" autocomplete="off" [(ngModel)]="serviceCharges" (keyup)="serviceCharges=validation.amountWithComma(serviceCharges)" (keypress)="validation.numberOnly($event)" placeholder="Service charges ({{PropertyLondon == 1 ? '£3000' : '£1000'}})">
            <span *ngIf="serviceCharges!=''" class="tick-g"><i class="fa fa-check" aria-hidden="true"></i></span>
        </div>
    </div>
    <div class="row mt-3 plr-15" [@atfirst]="letteingManagFee!='' && foreignbuyer!='' ?'visible':'hide'">
        <div class="col-md-5 pl0">
            <h5><b class="questyle">Other expenses</b></h5>
        </div>
        <div class="col-md-7 pr0">
            <input type="text" id="miscelleneousExpense" autocomplete="off" [(ngModel)]="miscelleneousExpense" (keyup)="miscelleneousExpense=validation.amountWithComma(miscelleneousExpense)" (keypress)="validation.numberOnly($event)" placeholder="Miscelleneous expense">
            <span *ngIf="miscelleneousExpense!=''" class="tick-g"><i class="fa fa-check" aria-hidden="true"></i></span>
        </div>
    </div>
    <div class="row plr-15 pt-5" id="FourthMain">
        
        <div class="col-md-12 pr0 mobile-center" style="text-align: right;">
            <button *ngIf="stampDutyLandTax!=''" class="btn btn-success" type="button" (click)="next()">Calculate</button>
        </div>
        <div class="col-md-9">
            <app-calculatordetails [coldesign]="6"></app-calculatordetails>
        </div>
    </div>
    </div>
