<div class="container" id="changepassworddiv" style="display: none;">
    <div class="row">
        <div class="login-div pt-60">
            <div class="row mb-25">
                <div class="col-md-8 col-6">
                    <h2>Reset Password</h2>
                </div>

            </div>
            <div class="row">
                <input type="text" hidden [(ngModel)]="Otp">
                <div class="alert alert-success fade show alertmsgdiv" id="resetpassalert">
                  {{alertmsg}}
                </div>
             
                <div class="form-group col-md-12">
                    <input type="text" class="form-control" id="otp" placeholder="OTP" name="otp" [(ngModel)]="Otp" (focus) = "hideresetalert()" autocomplete="off">
                </div>
                <div class="form-group col-md-12">
                    <input type="{{inputtype}}" class="form-control pr-45" id="pwd" placeholder="Password" name="pwd" [(ngModel)]="Password" (focus) = "hideresetalert()" autocomplete="off">
                    <i class="fa fa-eye lock-ic" (click) = "showpassword()" *ngIf = "!showPassword" style="cursor:pointer;"></i>
                    <i class="fa fa-lock lock-ic" (click) = "hidepassword()" *ngIf = "showPassword" style="cursor:pointer;"></i>
                </div>
                <div class="form-group col-md-12">
                    <input type="{{cnfinputtype}}" class="form-control pr-45" id="c_pwd" placeholder="Repeat Password" name="c_pwd" [(ngModel)]="ConfirmPassword" (focus) = "hideresetalert()" autocomplete="off">
                    <i class="fa fa-eye lock-ic" (click) = "showcnfpassword()" *ngIf = "!showcnfPassword" style="cursor:pointer;"></i>
                    <i class="fa fa-lock lock-ic" (click) = "hidecnfpassword()" *ngIf = "showcnfPassword" style="cursor:pointer;"></i>
                </div>

                <div class="col-md-12">
                    <button type="submit" class="btn btn-default resetsubmit-btn" (click)="resetPassword()" [disabled]="buttonText!=='Submit'">
                        <i class="fa fa-spin fa-spinner" *ngIf="buttonText!=='Submit'"></i> 
                        {{buttonText}}    
                    </button>
                    <button type="submit" class="btn btn-default resendsubmit-btn" (click)="sendOtp()" [disabled]="resendbuttonText!=='Resend OTP'">
                       <!-- <i class="fa fa-spin fa-spinner" *ngIf="resendbuttonText!=='Resend OTP'"></i>  -->
                        <div style="display: inline;" *ngIf = "resendbuttonText!='Resend OTP'">Resend OTP in </div> {{resendbuttonText}}    
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
