<div class="container" style="margin-top: 100px;"> 
<div class="row mt-30">
     <div class="col-md-6 col-6">
      <img src="./assets/exchange-breadcrumb.svg" class="wd125">
    </div> 
    <div class="col-md-6 col-12 bread-p text-right">
      <p class="mb-1">Foreign Exchange Calculator</p>
      <p class="mb-0">{{validation.getCurrentDateWithSpecificFormat()}}</p>
    </div> 
  </div>
  <div class="row mt-3 plr-1"  id="secondMain">
    <div class="mapcontainer">
        <app-googlemap [MapClassLoad]="MapLoad" [latitude]="lat" [longitude]="long"></app-googlemap>
    </div>
  </div>
  <div class="row  mt-3 plr-15"  id="thirdMain">
    <div class="col-md-12 p0 prl10">
        <progress-bar [progress]="15+(InvestmentGBP!=''?20:0)+(PreHomeCurrency==''?9.25:31.25)+(FXGrowth==''?9.25:31.25)" [color]="'#488aff'">
        </progress-bar>
    </div>
    <div class="col-md-2 col-6 p-back pl17">
        <a [routerLink]="['/step1']" class="backlink">Back</a>
    </div>
    <div class="col-md-10 col-6 p-rec pr13">
       <label class="float-right">{{17+(InvestmentGBP!=''?20:0)+(PreHomeCurrency==''?9.25:31.25)+(FXGrowth==''?9.25:31.25)|number:'1.0-0'}}% data recieved</label> 
    </div>
  </div>
  <div class="row mt-3 plr-15">
    <div class="col-md-5 pl0">
      <h5>
        <b class="questyle">
          Investment in GBP?
        </b>
      </h5>
    </div>
    <div class="col-md-7 pr0">
      <span class="input-euro left">
        <input type="text" id="InvestmentGBP" autocomplete="off" (keyup)="InvestmentGBP=validation.amountWithComma(InvestmentGBP)" placeholder="Enter Investment Value" [(ngModel)]="InvestmentGBP"> 
      </span>
      <span *ngIf="InvestmentGBP!=''" class="tick-g"><i class="fa fa-check" aria-hidden="true"></i></span>
    </div>
  </div>
  <div class="row mt-3 plr-15" [@InvestGBP]="InvestmentGBP!=''?'visible':'hide'">

<div class="row plr-15 mt-3" *ngIf="PreHomeCurrency!==''">
  <div class="col-md-5 pl0" style="padding-right: 32px;">
      <h5><b class="questyle">Home Currency Value?</b></h5>
  </div>
  <div class="col-md-7 pr0">
      <input type="text" id="homecurrencyvalue" autocomplete="off" (keypress)="validation.DesimalOnly($event,homecurrency)" placeholder="Home Currency Value" [(ngModel)]="homecurrency">
      <span *ngIf="homecurrency!=''" class="tick-g"><i class="fa fa-check" aria-hidden="true"></i></span>
  </div>
</div>
<div class="row mt-3 plr-15" [@PreHC]="PreHomeCurrency!=''?'visible':'hide'">
    <div class="col-md-5 pl0">
      <h5>
        <b class="questyle">
          FX Growth p.a?
        </b>
      </h5>
    </div>
    <div class="col-md-7 pr0">
      <input type="text" id="FXGrowth" autocomplete="off" (keyup)="FXGrowth=validation.appendPercent($event,FXGrowth)" placeholder="FX Growth (3%)" [(ngModel)]="FXGrowth"> 
      <span  *ngIf="FXGrowth!=''" class="tick-g"><i class="fa fa-check" aria-hidden="true"></i></span>
    </div> 
  </div>
  <div class="row plr-15 mt-3" [@PreHC]="FXGrowth!=''?'visible':'hide'" >
    <div class="col-md-5 pl0" style="padding-right: 32px;">
        <h5><b class="questyle">Investment Period?</b></h5>
    </div>
    <div class="col-md-7 pr0">
      <select id="investedTenure" [(ngModel)]="investedTenure">
        <option value="">Select</option>
        <option value="5">5</option>
        <option value="10">10</option>
        <option value="15">15</option>
    </select>
        <!-- <input type="text" id="investedTenure" autocomplete="off" (keypress)="validation.DesimalOnly($event,investedTenure)" placeholder="Investment tenure (In Years)" [(ngModel)]="investedTenure">

    </div>
  </div>

    <div class="col-md-12 pr0 mobile-center" style="text-align: right;" *ngIf="FXGrowth!=''">
